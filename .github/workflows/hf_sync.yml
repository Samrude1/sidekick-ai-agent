name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: Samrude1/sidekick-ai-agent
          huggingface_repo_id: samrude1/Sidekick
          hf_token: ${{ secrets.HF_TOKEN }}
